steps:
  - name: gcr.io/k8s-staging-test-infra/gcb-docker-gcloud:v20260108-7f313c340e
    entrypoint: /buildx-entrypoint
    args:
      - build
      - --tag=gcr.io/$PROJECT_ID/git-custom-k8s-auth:$_GIT_TAG
      - --build-arg=IMAGE_ARG=gcr.io/$PROJECT_ID/git-custom-k8s-auth:$_GIT_TAG
      - --build-arg=AWS_IAM_AUTHENTICATOR_VERSION=$_AWS_IAM_AUTHENTICATOR_VERSION
      - --build-arg=AZURE_KUBELOGIN_VERSION=$_AZURE_KUBELOGIN_VERSION
      - --build-arg=GKE_AUTH_PLUGIN_VERSION=$_GKE_AUTH_PLUGIN_VERSION
      - --platform=linux/amd64,linux/arm64,linux/ppc64le,linux/s390x,linux/riscv64
      - --push
      - .
    dir: .
  - name: gcr.io/k8s-staging-test-infra/gcb-docker-gcloud:v20260108-7f313c340e
    entrypoint: gcloud
    args:
      - container
      - images
      - add-tag
      - gcr.io/$PROJECT_ID/git-custom-k8s-auth:$_GIT_TAG
      - gcr.io/$PROJECT_ID/git-custom-k8s-auth:latest
substitutions:
  _GIT_TAG: "12345"
  _AWS_IAM_AUTHENTICATOR_VERSION: "0.7.15"
  _AZURE_KUBELOGIN_VERSION: "0.2.17"
  _GKE_AUTH_PLUGIN_VERSION: "35.0.0"
