postsubmits:
  kubernetes-sigs/kueue:
    - name: post-kueue-push-images
      cluster: k8s-infra-prow-build-trusted
      annotations:
        testgrid-dashboards: sig-scheduling, sig-k8s-infra-gcb
        testgrid-alert-email: kueue-alerts@kubernetes.io
        testgrid-num-failures-to-alert: '1'
      decorate: true
      decoration_config:
        timeout: 180m
        grace_period: 10m
      branches:
        - ^main$
        - ^release-
        # Build semver tags, too
        - ^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
      spec:
        serviceAccountName: gcb-builder
        containers:
          - image: gcr.io/k8s-staging-test-infra/image-builder:v20260419-39c657fdbf
            command:
              - /run.sh
            args:
              - --project=k8s-staging-images
              - --scratch-bucket=gs://k8s-staging-images-gcb
              - --env-passthrough=PULL_BASE_REF
              - --with-git-dir
              - --gcb-config=cloudbuild.yaml
              - .

periodics:
  - interval: 24h
    name: periodic-kueue-push-images
    cluster: k8s-infra-prow-build-trusted
    annotations:
      testgrid-dashboards: sig-scheduling, sig-k8s-infra-gcb
      testgrid-alert-email: kueue-alerts@kubernetes.io
      testgrid-num-failures-to-alert: '1'
    decorate: true
    decoration_config:
      timeout: 180m
      grace_period: 10m
    extra_refs:
      - org: kubernetes-sigs
        repo: kueue
        base_ref: main
        path_alias: sig.k8s.io/kueue
    spec:
      serviceAccountName: gcb-builder
      containers:
        - image: gcr.io/k8s-staging-test-infra/image-builder:v20260419-39c657fdbf
          command:
            - /run.sh
          args:
            - --project=k8s-staging-images
            - --scratch-bucket=gs://k8s-staging-images-gcb
            - --env-passthrough=PULL_BASE_REF
            - --with-git-dir
            - --gcb-config=cloudbuild-periodic.yaml
            - .
