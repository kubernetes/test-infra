postsubmits:
  kubernetes-sigs/dra-driver-cpu:
    - name: post-dra-driver-cpu-image
      cluster: k8s-infra-prow-build-trusted
      annotations:
        testgrid-dashboards: sig-node-dynamic-resource-allocation, sig-k8s-infra-gcb
      decorate: true
      branches:
        # this is a regex for semver, from https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
        - ^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
        - ^main$
        - ^release-.*
      spec:
        serviceAccountName: gcb-builder
        containers:
          - image: gcr.io/k8s-staging-test-infra/image-builder:v20251215-d7853fe2a6
            command:
              - /run.sh
            args:
              - --project=k8s-staging-networking
              - --scratch-bucket=gs://k8s-staging-networking-gcb
              - --env-passthrough=PULL_BASE_SHA
              - --build-dir=.
              - --with-git-dir
              - .
            env:
              - name: LOG_TO_STDOUT
                value: "y"
