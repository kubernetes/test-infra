# sigs.k8s.io/dra-driver-cpu presubmits
presubmits:
  kubernetes-sigs/dra-driver-cpu:
  - name: pull-dra-driver-cpu-modernize
    cluster: eks-prow-build-cluster
    path_alias: sigs.k8s.io/dra-driver-cpu
    run_if_changed: '\.go$|^go\.(mod|sum)$|^Makefile$'
    optional: true
    decorate: true
    annotations:
      testgrid-dashboards: sig-node-dra-driver-cpu
      testgrid-tab-name: modernize
      description: "Run modernize tool and report suggested code improvements"
    spec:
      containers:
      - image: public.ecr.aws/docker/library/golang:1.26
        command:
        - make
        - modernize
        resources:
          limits:
            cpu: 1
            memory: 4Gi
          requests:
            cpu: 1
            memory: 4Gi
  - name: pull-dra-driver-cpu-e2e-device-mode-individual-amd64
    cluster: eks-prow-build-cluster
    labels:
      preset-service-account: "true"
      preset-dind-enabled: "true"
    path_alias: sigs.k8s.io/dra-driver-cpu
    always_run: true
    optional: false
    decorate: true
    annotations:
      testgrid-dashboards: sig-node-dra-driver-cpu
      testgrid-tab-name: e2e-test-master-individual
      description: "Build image and run e2e-tests in individual mode"
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
      - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260706-7056f81a85-master
        env:
        - name: DRACPU_E2E_CPU_DEVICE_MODE
          value: "individual"
        - name: DRACPU_E2E_VERBOSE
          value: "1"
        command:
        # generic runner script, handles DIND, bazelrc for caching, etc.
        - runner.sh
        args:
        - hack/ci/prow.sh
        # we need privileged mode in order to do docker in docker
        securityContext:
          privileged: true
        resources:
          limits:
            cpu: 4
            memory: 8Gi
          requests:
            cpu: 4
            memory: 8Gi
