presubmits:
  kubernetes-sigs/container-object-storage-interface:

  - name: pull-container-object-storage-interface-build
    cluster: eks-prow-build-cluster
    always_run: true
    decorate: true
    path_alias: sigs.k8s.io/container-object-storage-interface
    labels:
      preset-dind-enabled: "true" # build uses docker, requires DinD
    annotations:
      testgrid-dashboards: sig-storage-container-object-storage-interface
      testgrid-tab-name: build
      description: Build test in container-object-storage-interface repo.
    spec:
      containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260622-537e33cc05-master
        command:
        - runner.sh
        args:
        - make
        - build
        resources:
          limits:
            cpu: 4
            memory: 6Gi
          requests:
            cpu: 4
            memory: 6Gi
        # docker-in-docker needs privileged mode
        securityContext:
          privileged: true
        env:
        - name: GOMAXPROCS # workaround for go not respecting cgroup resource limits/requests
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu

  - name: pull-container-object-storage-interface-unit
    cluster: eks-prow-build-cluster
    always_run: true
    decorate: true
    path_alias: sigs.k8s.io/container-object-storage-interface
    annotations:
      testgrid-dashboards: sig-storage-container-object-storage-interface
      testgrid-tab-name: unit
      description: Unit tests in container-object-storage-interface repo.
    spec:
      containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260622-537e33cc05-master
        command:
        - runner.sh
        args:
        - ./hack/prow-test.sh
        resources:
          limits:
            cpu: 4
            memory: 6Gi
          requests:
            cpu: 4
            memory: 6Gi
        env:
        - name: GOMAXPROCS # workaround for go not respecting cgroup resource limits/requests
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu

  - name: pull-container-object-storage-interface-lint
    cluster: eks-prow-build-cluster
    always_run: true
    decorate: true
    path_alias: sigs.k8s.io/container-object-storage-interface
    labels:
      preset-dind-enabled: "true" # build uses docker, requires DinD
    annotations:
      testgrid-dashboards: sig-storage-container-object-storage-interface
      testgrid-tab-name: lint
      description: Linters in container-object-storage-interface repo.
    spec:
      containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260622-537e33cc05-master
        command:
        - runner.sh
        args:
        - ./hack/prow-lint.sh
        resources:
          limits:
            cpu: 4
            memory: 6Gi
          requests:
            cpu: 4
            memory: 6Gi
        # docker-in-docker needs privileged mode
        securityContext:
          privileged: true
        env:
        - name: GOMAXPROCS # workaround for go not respecting cgroup resource limits/requests
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu

  - name: pull-container-object-storage-interface-check-generated-files
    cluster: eks-prow-build-cluster
    always_run: true
    decorate: true
    path_alias: sigs.k8s.io/container-object-storage-interface
    annotations:
      testgrid-dashboards: sig-storage-container-object-storage-interface
      testgrid-tab-name: check-generated-files
      description: Check generated files in container-object-storage-interface repo.
    spec:
      containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260622-537e33cc05-master
        command:
        - runner.sh
        args:
        - ./hack/prow-check-generate.sh
        resources:
          limits:
            cpu: 4
            memory: 6Gi
          requests:
            cpu: 4
            memory: 6Gi
        env:
        - name: GOMAXPROCS # workaround for go not respecting cgroup resource limits/requests
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu

  - name: pull-container-object-storage-interface-e2e
    cluster: k8s-infra-prow-build
    always_run: false
    optional: true
    decorate: true
    path_alias: sigs.k8s.io/container-object-storage-interface
    labels:
      preset-dind-enabled: "true" # e2e builds images with docker, requires DinD
      preset-service-account: "true" # kops uses boskos-backed GCE projects
      preset-k8s-ssh: "true" # kops needs SSH access to nodes
    extra_refs:
    - org: kubernetes
      repo: kops
      base_ref: master
      path_alias: k8s.io/kops
    annotations:
      testgrid-dashboards: sig-storage-container-object-storage-interface
      testgrid-tab-name: e2e-kops-gce
      description: E2e tests in container-object-storage-interface repo on a kops-created GCE cluster.
    spec:
      serviceAccountName: k8s-kops-test
      containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260622-537e33cc05-master
        command:
        - runner.sh
        args:
        - bash
        - -xc
        - |
          make -C $GOPATH/src/k8s.io/kops test-e2e-install
          ./hack/prow-e2e-kops.sh
        resources:
          limits:
            cpu: 4
            memory: 14Gi
          requests:
            cpu: 4
            memory: 14Gi
        # docker-in-docker needs privileged mode
        securityContext:
          privileged: true
        env:
        - name: GOMAXPROCS # workaround for go not respecting cgroup resource limits/requests
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu
