periodics:
- name: periodic-agent-sandbox-perf-load-test
  cluster: eks-prow-build-cluster
  interval: 6h
  decorate: true
  annotations:
    testgrid-dashboards: sig-apps-agent-sandbox
  extra_refs:
  - org: kubernetes-sigs
    repo: agent-sandbox
    base_ref: main
  labels:
    preset-dind-enabled: "true"
    preset-kind-volume-mounts: "true"
  spec:
    containers:
    - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260504-c27e3ff179-master
      command:
      - runner.sh
      - dev/ci/periodics/test-load-test
      securityContext:
        privileged: true
      resources:
        requests:
          cpu: 7
          memory: 14Gi
        limits:
          cpu: 7
          memory: 14Gi
