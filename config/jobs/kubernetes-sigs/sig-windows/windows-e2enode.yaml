periodics:
- name: ci-kubernetes-e2enode-windows-master
  cluster: eks-prow-build-cluster
  interval: 8h
  decorate: true
  decoration_config:
    timeout: 4h
  labels:
    preset-dind-enabled: "true"
    preset-azure-community: "true"
  extra_refs:
  - org: kubernetes-sigs
    repo: windows-testing
    base_ref: master
    path_alias: sigs.k8s.io/windows-testing
  spec:
    serviceAccountName: azure
    containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260629-f759c32706-master
        command:
          - "runner.sh"
          - "./scripts/ci-k8s-e2e-node-test.sh"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 2
            memory: "5Gi"
          limits:
            cpu: 2
            memory: "5Gi"
        env:
          - name: VM_LOCATION
            value: northeurope
          - name: CONTAINERD_VERSION
            value: "nightly"
  annotations:
    testgrid-dashboards: sig-windows-signal
    testgrid-tab-name: windows-e2e-node-master

presubmits:
  kubernetes-sigs/windows-testing:
    - name: pull-kubernetes-e2enode-windows
      always_run: false
      cluster: eks-prow-build-cluster
      decorate: true
      decoration_config:
        timeout: 4h
      optional: true
      labels:
        preset-dind-enabled: "true"
        preset-azure-community: "true"
      path_alias: sigs.k8s.io/windows-testing
      run_if_changed: '^scripts\/.*'
      spec:
        serviceAccountName: azure
        containers:
          - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260629-f759c32706-master
            command:
              - "runner.sh"
              - "./scripts/ci-k8s-e2e-node-test.sh"
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 2
                memory: "5Gi"
              limits:
                cpu: 2
                memory: "5Gi"
            env:
              - name: VM_LOCATION
                value: northeurope
              - name: CONTAINERD_VERSION
                value: "nightly"
      annotations:
        testgrid-dashboards: sig-windows-presubmit
        testgrid-tab-name: pr-windows-e2e-node-master
