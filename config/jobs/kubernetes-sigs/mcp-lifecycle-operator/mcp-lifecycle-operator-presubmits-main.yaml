presubmits:
  kubernetes-sigs/mcp-lifecycle-operator:
  - name: presubmit-mcp-lifecycle-operator-unit-test
    cluster: eks-prow-build-cluster
    always_run: true
    decorate: true
    spec:
      containers:
      - image: public.ecr.aws/docker/library/golang:1.24
        command:
        - make
        args:
        - test
        resources:
          requests:
            cpu: 1
            memory: 4Gi
          limits:
            cpu: 1
            memory: 4Gi
    annotations:
      testgrid-dashboards: sig-apps-mcp-lifecycle-operator
      testgrid-tab-name: presubmit-mcp-lifecycle-operator-unit-test
  - name: presubmit-mcp-lifecycle-operator-e2e-test
    cluster: eks-prow-build-cluster
    always_run: true
    optional: true
    decorate: true
    labels:
      preset-dind-enabled: "true"
      preset-kind-volume-mounts: "true"
    spec:
      containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260615-7f7c36e951-master
        command:
        - runner.sh
        args:
        - bash
        - -c
        - >-
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64 &&
          chmod +x ./kind &&
          mv ./kind /usr/local/bin/kind &&
          make deploy-test-e2e test-e2e
        # docker-in-docker needs privileged mode
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 4
            memory: 6Gi
          limits:
            cpu: 4
            memory: 6Gi
    annotations:
      testgrid-dashboards: sig-apps-mcp-lifecycle-operator
      testgrid-tab-name: presubmit-mcp-lifecycle-operator-e2e-test
