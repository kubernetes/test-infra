periodics:
  - interval: 12h
    name: periodic-node-readiness-controller-test-e2e-main-1-36
    cluster: eks-prow-build-cluster
    extra_refs:
      - org: kubernetes-sigs
        repo: node-readiness-controller
        base_ref: main
        path_alias: sigs.k8s.io/node-readiness-controller
    annotations:
      testgrid-dashboards: sig-node-node-readiness-controller
      testgrid-num-failures-to-alert: '1'
      testgrid-alert-email: ajaysundar.k@gmail.com
      description: "Run periodic node-readiness-controller e2e tests for Kubernetes 1.36"
      testgrid-num-columns-recent: '30'
      testgrid-create-test-group: 'true'
    labels:
      preset-dind-enabled: "true"
    decorate: true
    decoration_config:
      timeout: 2h
    spec:
      containers:
        - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260710-6dab2861c0-master
          env:
            - name: E2E_KIND_VERSION
              value: v1.36
          command:
            - runner.sh
          args:
            - make
            - test-e2e-kind
          securityContext:
            privileged: true
          resources:
            limits:
              cpu: 3
              memory: 10Gi
            requests:
              cpu: 3
              memory: 10Gi
