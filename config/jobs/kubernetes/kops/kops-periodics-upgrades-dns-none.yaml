# Test jobs generated by build_jobs.py (do not manually edit)
# 3 jobs, total of 49 runs per week
periodics:

# {"cloud": "aws", "distro": "u2404", "extra_flags": "--networking=cilium --dns=none --api-loadbalancer-type=public", "k8s_version": "stable", "kops_channel": "alpha", "kops_version": "latest", "networking": "cilium"}
- name: e2e-kops-aws-upgrade-dns-none
  cluster: k8s-infra-kops-prow-build
  cron: '13 3-23/8 * * *'
  labels:
    preset-service-account: "true"
    preset-aws-ssh: "true"
    preset-k8s-kops-aws-credential: "true"
  max_concurrency: 1
  decorate: true
  decoration_config:
    timeout: 150m
  extra_refs:
  - org: kubernetes
    repo: kops
    base_ref: master
    workdir: true
    path_alias: k8s.io/kops
  spec:
    serviceAccountName: prowjob-default-sa
    containers:
    - command:
      - runner.sh
      args:
      - ./tests/e2e/scenarios/upgrade-ab/run-test.sh
      env:
      - name: GINKGO_NO_COLOR
        value: "TRUE"
      - name: KOPS_VERSION_A
        value: "1.35"
      - name: K8S_VERSION_A
        value: "v1.35.5"
      - name: KOPS_VERSION_B
        value: "latest"
      - name: K8S_VERSION_B
        value: "v1.36.1"
      - name: KOPS_SKIP_E2E
        value: "1"
      - name: KOPS_CONTROL_PLANE_SIZE
        value: "3"
      - name: KOPS_STATE_STORE
        value: "s3://k8s-kops-ci-prow-state-store"
      - name: KOPS_DNS_DOMAIN
        value: "tests-kops-aws.k8s.io"
      - name: CLOUD_PROVIDER
        value: "aws"
      - name: KUBE_SSH_USER
        value: "ubuntu"
      - name: CLUSTER_NAME
        value: "e2e-e5b7b461c1-2dc58.tests-kops-aws.k8s.io"
      - name: KOPS_EXTRA_FLAGS
        value: "--networking=cilium --dns=none --api-loadbalancer-type=public"
      image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260720-39d457d26c-master
      imagePullPolicy: Always
      resources:
        limits:
          cpu: "4"
          memory: 6Gi
        requests:
          cpu: "4"
          memory: 6Gi
      securityContext:
        privileged: true
  annotations:
    test.kops.k8s.io/cloud: aws
    test.kops.k8s.io/distro: u2404
    test.kops.k8s.io/extra_flags: --networking=cilium --dns=none --api-loadbalancer-type=public
    test.kops.k8s.io/k8s_version: stable
    test.kops.k8s.io/kops_channel: alpha
    test.kops.k8s.io/kops_version: latest
    test.kops.k8s.io/networking: cilium
    testgrid-dashboards: kops-distro-u2404, kops-k8s-stable, kops-latest, kops-network-cilium, kops-upgrades, sig-cluster-lifecycle-kops
    testgrid-days-of-results: '90'
    testgrid-tab-name: kops-aws-upgrade-dns-none

