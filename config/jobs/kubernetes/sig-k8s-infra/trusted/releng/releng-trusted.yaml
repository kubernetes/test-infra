postsubmits:
  kubernetes/k8s.io:
  - name: post-k8sio-file-promo
    cluster: k8s-infra-prow-build-trusted
    decorate: true
    run_if_changed: '^artifacts\/(filestores|manifests)\/.*\/*.yaml'
    # Never run more than 1 job at a time. This is because we don't want to run
    # into a case where an older manifest PR merge gets run last (after a newer
    # one).
    max_concurrency: 1
    branches:
    - ^main$
    spec:
      serviceAccountName: k8s-infra-promoter
      containers:
      - image: registry.k8s.io/artifact-promoter/kpromo:v4.3.0-0
        command:
        - /kpromo
        args:
        - run
        - files
        - --manifests=/home/prow/go/src/github.com/kubernetes/k8s.io/artifacts/
        - --confirm
    annotations:
      testgrid-dashboards: sig-release-releng-blocking, sig-k8s-infra-k8sio
      testgrid-alert-email: k8s-infra-alerts@kubernetes.io, release-managers+alerts@kubernetes.io
      testgrid-num-failures-to-alert: '2'
  - name: post-k8sio-image-promo
    rerun_auth_config:
      github_team_slugs:
      - org: kubernetes
        slug: sig-k8s-infra-leads
      - org: kubernetes
        slug: sig-testing-leads
      - org: kubernetes
        slug: sig-release-leads
      - org: kubernetes
        slug: release-managers
    cluster: k8s-infra-prow-build-trusted
    decorate: true
    decoration_config:
      timeout: 4h
    run_if_changed: 'registry.k8s.io/((images/.*/images\.yaml)|(manifests/.*/promoter-manifest\.yaml))'
    # Never run more than 1 job at a time. This is because we don't want to run
    # into a case where an older manifest PR merge gets run last (after a newer
    # one).
    max_concurrency: 1
    # Run only 1 of image promotion postsubmit and periodic at the same time.
    # This is an important step to ensure that we avoid issues of running promotion
    # twice in parallel, such as double signing images.
    job_queue_name: "k8sio-image-promo"
    branches:
    - ^main$
    spec:
      serviceAccountName: k8s-infra-gcr-promoter
      containers:
      - image: gcr.io/k8s-staging-artifact-promoter/kpromo:latest
        imagePullPolicy: Always
        command:
        - /kpromo
        args:
        - cip
        - --thin-manifest-dir=/home/prow/go/src/github.com/kubernetes/k8s.io/registry.k8s.io
        - --use-prow-manifest-diff
        - --confirm
        - --certificate-identity-regexp=(krel-staging@k8s-releng-prod.iam.gserviceaccount.com)|(krel-trust@k8s-releng-prod.iam.gserviceaccount.com)
        - --certificate-oidc-issuer=https://accounts.google.com
        env:
        - name: GOMAXPROCS
          value: "7"
        resources:
          # request most of one node ðŸš€
          requests:
            cpu: 7
            memory: "40Gi"
          limits:
            cpu: 7
            memory: "40Gi"
    annotations:
      testgrid-dashboards: sig-release-releng-blocking, sig-k8s-infra-k8sio
      testgrid-alert-email: k8s-infra-alerts@kubernetes.io, release-managers+alerts@kubernetes.io
      testgrid-num-failures-to-alert: '2'

  kubernetes-sigs/promo-tools:
  # This job is a canary job to test promoting the image promoter before
  # rolling changes out to production instances
  - name: post-promo-tools-image-promo-canary
    cluster: k8s-infra-prow-build-trusted
    decorate: true
    run_if_changed: 'canary/((images/.*/images\.yaml)|(manifests/.*/promoter-manifest\.yaml))'
    # Never run more than 1 job at a time. This is because we don't want to run
    # into a case where an older manifest PR merge gets run last (after a newer
    # one).
    max_concurrency: 1
    branches:
    - ^main$
    spec:
      serviceAccountName: k8s-infra-gcr-promoter
      containers:
      - image: gcr.io/k8s-staging-artifact-promoter/kpromo:latest-canary
        imagePullPolicy: Always
        command:
        - /kpromo
        args:
        - cip
        - --thin-manifest-dir=/home/prow/go/src/github.com/kubernetes-sigs/promo-tools/canary
        - --confirm
    annotations:
      testgrid-dashboards: sig-release-releng-informing
      testgrid-alert-email: release-managers+alerts@kubernetes.io
      testgrid-num-failures-to-alert: '2'

periodics:
- interval: 1h
  cluster: k8s-infra-prow-build-trusted
  max_concurrency: 1
  name: ci-k8sio-file-promo
  decorate: true
  extra_refs:
  - org: kubernetes
    repo: k8s.io
    base_ref: main
  spec:
    serviceAccountName: k8s-infra-promoter
    containers:
    - image: registry.k8s.io/artifact-promoter/kpromo:v4.3.0-0
      command:
      - /kpromo
      args:
      - run
      - files
      - --manifests=/home/prow/go/src/github.com/kubernetes/k8s.io/artifacts/
      - --confirm
  annotations:
    testgrid-dashboards: sig-release-releng-blocking, sig-k8s-infra-k8sio
    testgrid-alert-email: k8s-infra-alerts@kubernetes.io, release-managers+alerts@kubernetes.io
    testgrid-num-failures-to-alert: '2'
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers

# Copy artifacts to mirrors (periodic drift correction)
- interval: 1h
  cluster: k8s-infra-prow-build-trusted
  max_concurrency: 1
  name: ci-k8sio-file-promo-mirrors
  decorate: true
  decoration_config:
    timeout: 3h
  extra_refs:
  - org: kubernetes
    repo: k8s.io
    base_ref: main
  spec:
    serviceAccountName: k8s-infra-promoter
    containers:
    - name: promote-to-mirrors
      image: registry.k8s.io/artifact-promoter/kpromo:v4.3.0-0
      command:
      - /kpromo
      args:
      - run
      - files
      - --manifests=/home/prow/go/src/github.com/kubernetes/k8s.io/artifacts/mirroring
      - --confirm
      - --use-service-account
      env:
        - name: AWS_ROLE_ARN
          value: arn:aws:iam::354561287328:role/artifacts.k8s.io_s3writer
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: /var/run/secrets/aws-iam-token/serviceaccount/token
        - name: AWS_REGION
          value: us-east-1
      resources:
        # We hash files as we upload them, so take a whole core
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
      volumeMounts:
        - mountPath: /var/run/secrets/aws-iam-token/serviceaccount
          name: aws-iam-token
          readOnly: true
    - name: promote-to-mirrors-staging
      image: registry.k8s.io/artifact-promoter/kpromo:v4.3.0-0
      command:
      - /kpromo
      args:
      - run
      - files
      - --manifests=/home/prow/go/src/github.com/kubernetes/k8s.io/artifacts/mirroring-staging
      - --confirm
      - --use-service-account
      env:
        - name: AWS_ROLE_ARN
          value: arn:aws:iam::354561287328:role/artifacts.k8s.io_s3writer
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: /var/run/secrets/aws-iam-token/serviceaccount/token
        - name: AWS_REGION
          value: us-east-1
      resources:
        # We hash files as we upload them, so take a whole core
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
      volumeMounts:
        - mountPath: /var/run/secrets/aws-iam-token/serviceaccount
          name: aws-iam-token
          readOnly: true
    volumes:
    - name: aws-iam-token
      projected:
        defaultMode: 420
        sources:
        - serviceAccountToken:
            audience: sts.amazonaws.com
            expirationSeconds: 86400
            path: token
  annotations:
    testgrid-dashboards: sig-release-releng-blocking, sig-k8s-infra-k8sio
    #testgrid-alert-email: k8s-infra-alerts@kubernetes.io, release-managers+alerts@kubernetes.io
    #testgrid-num-failures-to-alert: '2'
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers

# ci-k8sio-image-promo runs daily as a backstop on top of the postsubmit
# ~midnight pacific
- cron: '0 7 * * *'
  cluster: k8s-infra-prow-build-trusted
  max_concurrency: 1
  # Run only 1 of image promotion postsubmit and periodic at the same time.
  # This is an important step to ensure that we avoid issues of running promotion
  # twice in parallel, such as double signing images.
  job_queue_name: "k8sio-image-promo"
  # This name is the "job name", passed in as "--job=NAME" for mkpj.
  name: ci-k8sio-image-promo
  # Enable Pod Utilities.
  # See https://git.k8s.io/test-infra/prow/pod-utilities.md.
  decorate: true
  extra_refs:
  # We clone the below repo automatically (via Pod Utilities), and get dropped
  # into /home/prow/go/src/github.com/kubernetes/k8s.io.
  - org: kubernetes
    repo: k8s.io
    base_ref: main
  spec:
    # The k8s-artifacts-prod name was chosen in
    # https://github.com/kubernetes/k8s.io/pull/695.
    serviceAccountName: k8s-infra-gcr-promoter
    containers:
    - image: gcr.io/k8s-staging-artifact-promoter/kpromo:latest
      imagePullPolicy: Always
      command:
      - /kpromo
      args:
      - cip
      - --thin-manifest-dir=/home/prow/go/src/github.com/kubernetes/k8s.io/registry.k8s.io
      - --confirm
      - --certificate-identity-regexp=(krel-staging@k8s-releng-prod.iam.gserviceaccount.com)|(krel-trust@k8s-releng-prod.iam.gserviceaccount.com)
      - --certificate-oidc-issuer=https://accounts.google.com
      env:
      - name: GOMAXPROCS
        value: "7"
      resources:
        # request most of one node ðŸš€
        requests:
          cpu: 7
          memory: "40Gi"
        limits:
          cpu: 7
          memory: "40Gi"
  annotations:
    testgrid-dashboards: sig-release-releng-blocking, sig-k8s-infra-k8sio
    testgrid-alert-email: k8s-infra-alerts@kubernetes.io, release-managers+alerts@kubernetes.io
    testgrid-num-failures-to-alert: '2'
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers

# ci-k8sio-image-signature-replication replicates cosign signatures from
# primary registries to all mirror registries. Runs independently of the
# promotion pipeline to avoid rate limit contention with cosign signing.
# The operation is idempotent; missed or failed replications are caught
# on the next run.
- cron: '0 */2 * * 1-5'
  cluster: k8s-infra-prow-build-trusted
  max_concurrency: 1
  name: ci-k8sio-image-signature-replication
  decorate: true
  extra_refs:
  - org: kubernetes
    repo: k8s.io
    base_ref: main
  spec:
    serviceAccountName: k8s-infra-gcr-promoter
    containers:
    - image: gcr.io/k8s-staging-artifact-promoter/kpromo:latest
      imagePullPolicy: Always
      command:
      - /kpromo
      args:
      - cip
      - replicate-signatures
      - --thin-manifest-dir=/home/prow/go/src/github.com/kubernetes/k8s.io/registry.k8s.io
      - --confirm
      resources:
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
  annotations:
    testgrid-dashboards: sig-release-releng-informing, sig-k8s-infra-k8sio
    testgrid-alert-email: release-managers+alerts@kubernetes.io
    testgrid-num-failures-to-alert: '3'
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers

# This job is a canary job to test promoting the image promoter before
# rolling changes out to production instances
- interval: 1h
  cluster: k8s-infra-prow-build-trusted
  max_concurrency: 1
  name: ci-promo-tools-image-promo-canary
  decorate: true
  extra_refs:
  - org: kubernetes-sigs
    repo: promo-tools
    base_ref: main
  spec:
    serviceAccountName: k8s-infra-gcr-promoter
    containers:
    - image: gcr.io/k8s-staging-artifact-promoter/kpromo:latest-canary
      imagePullPolicy: Always
      command:
      - /kpromo
      args:
      - cip
      - --thin-manifest-dir=/home/prow/go/src/github.com/kubernetes-sigs/promo-tools/canary
      - --confirm
      - --log-level=debug
      - --certificate-identity-regexp=(keyless@projectsigstore.iam.gserviceaccount.com)|(krel-trust@k8s-releng-prod.iam.gserviceaccount.com)
      - --certificate-oidc-issuer=https://accounts.google.com
  annotations:
    testgrid-dashboards: sig-release-releng-informing
    testgrid-alert-email: release-managers+alerts@kubernetes.io
    testgrid-num-failures-to-alert: '2'
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers

- interval: 6h
  name: ci-fast-forward
  cluster: k8s-infra-prow-build-trusted
  decorate: true
  extra_refs:
  - org: kubernetes
    repo: release
    base_ref: master
    path_alias: k8s.io/release
  spec:
    serviceAccountName: gcb-builder
    containers:
    - image: gcr.io/k8s-staging-releng/k8s-ci-builder:latest-default
      imagePullPolicy: Always
      command:
      - wrapper.sh
      - /krel
      - fast-forward
      - --non-interactive
      - --submit
      - --nomock
      resources:
        requests:
          cpu: 4
          memory: "8Gi"
        limits:
          cpu: 4
          memory: "8Gi"
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers
  annotations:
    testgrid-alert-email: release-managers+alerts@kubernetes.io
    testgrid-dashboards: sig-release-releng-blocking
    testgrid-tab-name: git-repo-kubernetes-fast-forward

- name: periodic-release-verify-image-signatures
  cluster: k8s-infra-prow-build-trusted
  interval: 4h
  annotations:
    testgrid-alert-email: release-managers+alerts@kubernetes.io
    testgrid-dashboards: sig-release-releng-informing
    testgrid-tab-name: verify-image-signatures
  decorate: true
  extra_refs:
  - org: kubernetes-sigs
    repo: promo-tools
    base_ref: main
    path_alias: sigs.k8s.io/promo-tools
  spec:
    containers:
    - image: gcr.io/k8s-staging-artifact-promoter/kpromo:v4.3.0-0
      imagePullPolicy: Always
      command:
        - /kpromo
        - --from-days=7
      args:
        - sigcheck
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers

- name: ci-downloadkubernetes-upload-dl-k8s-io
  cluster: k8s-infra-prow-build-trusted
  cron: "0 0 * * *"
  annotations:
    testgrid-alert-email: release-managers+alerts@kubernetes.io
    testgrid-dashboards: sig-release-releng-informing
    testgrid-tab-name: downloadkubernetes-upload-dl-k8s-io
  decorate: true
  extra_refs:
  - org: kubernetes-sigs
    repo: downloadkubernetes
    base_ref: main
    path_alias: sigs.k8s.io/downloadkubernetes
  spec:
    serviceAccountName: gcb-builder
    containers:
      - image: gcr.io/k8s-staging-test-infra/image-builder:v20251215-d7853fe2a6
        command:
          - /run.sh
        args:
          - --project=k8s-release
          - --scratch-bucket=gs://k8s-release-gcb
          - --env-passthrough=BUCKET_NAME,FASTLY_SERVICE_NAME
          - --with-git-dir
          - .
        env:
          - name: LOG_TO_STDOUT
            value: "y"
          - name: BUCKET_NAME
            value: 767373bbdcb8270361b96548387bf2a9ad0d48758c35
          - name: FASTLY_SERVICE_NAME
            value: dl.k8s.io
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers

- name: ci-downloadkubernetes-upload-dl-k8s-dev
  cluster: k8s-infra-prow-build-trusted
  cron: "0 0 * * *"
  annotations:
    testgrid-alert-email: release-managers+alerts@kubernetes.io
    testgrid-dashboards: sig-release-releng-informing
    testgrid-tab-name: downloadkubernetes-upload-dl-k8s-dev
  decorate: true
  extra_refs:
  - org: kubernetes-sigs
    repo: downloadkubernetes
    base_ref: main
    path_alias: sigs.k8s.io/downloadkubernetes
  spec:
    serviceAccountName: gcb-builder
    containers:
      - image: gcr.io/k8s-staging-test-infra/image-builder:v20251215-d7853fe2a6
        command:
          - /run.sh
        args:
          - --project=k8s-release
          - --scratch-bucket=gs://k8s-release-gcb
          - --env-passthrough=BUCKET_NAME,FASTLY_SERVICE_NAME
          - --with-git-dir
          - .
        env:
          - name: LOG_TO_STDOUT
            value: "y"
          - name: BUCKET_NAME
            value: 5d7373bbdcb8270361b96548387bf2a9ad0d48758c35
          - name: FASTLY_SERVICE_NAME
            value: dl.k8s.dev
  rerun_auth_config:
    github_team_slugs:
      - org: kubernetes
        slug: release-managers
