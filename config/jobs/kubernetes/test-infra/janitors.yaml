periodics:
- name: maintenance-ci-shared-aws-janitor
  cluster: eks-prow-build-cluster
  interval: 1h
  labels:
    preset-service-account: "true"
    preset-aws-ssh: "true"
    preset-aws-credential-aws-shared-testing: "true"
  decorate: true
  spec:
    containers:
    - command:
      - /app
      args:
      - --ttl=6h
      - --path=s3://cloud-provider-aws-shared-e2e/objs.json
      - --exclude-tags=Shared=Ignore
      - --enable-target-group-clean=true
      - --clean-ecr-repositories=aws-ebs-csi-driver
      image: gcr.io/k8s-staging-boskos/aws-janitor:v20260519-f0a76c5
      resources:
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
  annotations:
    testgrid-dashboards: sig-testing-maintenance
    testgrid-tab-name: ci-shared-aws-janitor
    description: Deletes old AWS resources for shared jobs

- interval: 1h
  name: maintenance-ci-aws-janitor
  cluster: k8s-infra-kops-prow-build
  labels:
    preset-service-account: "true"
    preset-aws-ssh: "true"
    preset-aws-credential: "true"
  decorate: true
  spec:
    containers:
    - command:
      - /app
      args:
      - --ttl=2h30m
      - --path=s3://k8s-kops-prow/objs.json
      - --exclude-tags=Shared=Ignore
      - --clean-ecr-repositories=aws-ebs-csi-driver
      image: gcr.io/k8s-staging-boskos/aws-janitor:v20260519-f0a76c5
      resources:
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
  annotations:
    testgrid-dashboards: sig-testing-maintenance
    testgrid-tab-name: ci-aws-janitor
    description: Deletes old AWS resources

- interval: 1h
  name: maintenance-ci-kops-aws-janitor
  cluster: k8s-infra-kops-prow-build
  labels:
    preset-service-account: "true"
    preset-k8s-kops-aws-credential: "true"
  decorate: true
  spec:
    containers:
    - command:
      - /app
      args:
      # START IN DRY-RUN. Verify the run would delete the ~546 e2e-*/pr* orphans and ZERO
      # k8s-infra-kops-prow-build (EKS build cluster) resources, then drop this flag.
      - --dry-run=true
      # TTL must exceed the longest legit cluster lifetime in this account. Conformance jobs
      # run test_timeout_minutes=200 (~3.3h); 12h leaves wide margin yet still reaps ~$45k/mo
      # (orphans are >30d..720d old). Tighten later once max job duration is confirmed.
      - --ttl=12h
      - --path=s3://k8s-kops-ci-prow-state-store/objs.json
      # Protect Terraform-managed permanent infra (EKS build cluster + its VPC/NAT/SGs/nodes).
      # Route53 zone, the state S3 bucket, and SSH keypairs are already safe: the DNS/S3/keypair
      # cleaners default to OFF (we do not pass --enable-dns-zone-clean / -s3-buckets / -key-pairs).
      - --exclude-tags=managed-by=Terraform
      image: gcr.io/k8s-staging-boskos/aws-janitor:v20260519-f0a76c5
      resources:
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
  annotations:
    testgrid-dashboards: sig-testing-maintenance
    testgrid-tab-name: tests-kops-aws-janitor
    description: Deletes old AWS resources in the kops-infra-ci account (tests-kops-aws.k8s.io / 808842816990)
