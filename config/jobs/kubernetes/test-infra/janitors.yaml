periodics:
- name: maintenance-ci-shared-aws-janitor
  cluster: eks-prow-build-cluster
  interval: 1h
  labels:
    preset-service-account: "true"
    preset-aws-ssh: "true"
    preset-aws-credential-aws-shared-testing: "true"
  decorate: true
  spec:
    containers:
    - command:
      - /app
      args:
      - --ttl=6h
      - --path=s3://cloud-provider-aws-shared-e2e/objs.json
      - --exclude-tags=Shared=Ignore
      - --enable-target-group-clean=true
      - --clean-ecr-repositories=aws-ebs-csi-driver
      image: gcr.io/k8s-staging-boskos/aws-janitor:v20260519-f0a76c5
      resources:
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
  annotations:
    testgrid-dashboards: sig-testing-maintenance
    testgrid-tab-name: ci-shared-aws-janitor
    description: Deletes old AWS resources for shared jobs

- interval: 1h
  name: maintenance-ci-aws-janitor
  cluster: k8s-infra-kops-prow-build
  labels:
    preset-service-account: "true"
    preset-aws-ssh: "true"
    preset-aws-credential: "true"
  decorate: true
  spec:
    containers:
    - command:
      - /app
      args:
      - --ttl=2h30m
      - --path=s3://k8s-kops-prow/objs.json
      - --exclude-tags=Shared=Ignore
      - --clean-ecr-repositories=aws-ebs-csi-driver
      image: gcr.io/k8s-staging-boskos/aws-janitor:v20260519-f0a76c5
      resources:
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
  annotations:
    testgrid-dashboards: sig-testing-maintenance
    testgrid-tab-name: ci-aws-janitor
    description: Deletes old AWS resources

- interval: 1h
  name: maintenance-ci-kops-aws-janitor
  cluster: k8s-infra-kops-prow-build
  labels:
    preset-service-account: "true"
    preset-k8s-kops-aws-credential: "true"
  decorate: true
  spec:
    containers:
    - command:
      - /app
      args:
      - --ttl=12h  # must exceed the longest job here (serial-canary ~10.5h)
      - --path=s3://k8s-kops-ci-prow/objs.json
      # managed-by=Terraform covers its TF-managed resources
      # eks:cluster-name covers the node-group ASG (EKS tags it eks:* but not managed-by=Terraform)
      - --exclude-tags=managed-by=Terraform,eks:cluster-name=k8s-infra-kops-prow-build
      image: gcr.io/k8s-staging-boskos/aws-janitor:v20260519-f0a76c5
      resources:
        requests:
          cpu: 1
          memory: "2Gi"
        limits:
          cpu: 1
          memory: "2Gi"
  annotations:
    testgrid-dashboards: sig-testing-maintenance
    testgrid-tab-name: ci-kops-aws-janitor
    description: Deletes old AWS resources in the kops-infra-ci account (tests-kops-aws.k8s.io / 808842816990)
