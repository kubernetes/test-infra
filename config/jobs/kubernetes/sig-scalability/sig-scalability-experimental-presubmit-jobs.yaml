# Experimental presubmit jobs for sig-scalability.
# These are not release-blocking and are intentionally separated from the
# official presubmits in sig-scalability-presubmit-jobs.yaml. Stability and
# lifecycle differ: jobs here may change or be removed at any time, and the
# rules for adding/changing them are looser than for the official set.
presubmits:
  kubernetes/kubernetes:
  # Currently testing RangeStream.
  - name: pull-kubernetes-gce-master-scale-performance-100-experimental
    cluster: k8s-infra-prow-build
    always_run: false
    optional: true
    branches:
    - master
    - main
    decorate: true
    path_alias: k8s.io/kubernetes
    labels:
      preset-k8s-ssh: "true"
      preset-dind-enabled: "true"
    decoration_config:
      timeout: 100m
    extra_refs:
    - org: kubernetes
      repo: kops
      base_ref: master
      workdir: true
      path_alias: k8s.io/kops
    - org: kubernetes
      repo: perf-tests
      base_ref: master
      path_alias: k8s.io/perf-tests
    annotations:
      testgrid-dashboards: presubmits-kubernetes-scalability
      testgrid-tab-name: pull-kubernetes-gce-master-scale-performance-100-experimental
    spec:
      serviceAccountName: prow-build
      containers:
      - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260622-537e33cc05-master
        command:
        - runner.sh
        args:
        - ./tests/e2e/scenarios/scalability/run-test.sh
        securityContext:
          privileged: true
        env:
        - name: CL2_RESTART_APISERVER
          value: "true"
        - name: KUBE_FEATURE_GATES
          value: "+EtcdRangeStream"
        - name: CL2_HEAP_PROFILE_INTERVAL
          value: "1m"
        - name: KUBE_SSH_KEY_PATH
          value: /etc/ssh-key-secret/ssh-private
        - name: KUBE_SSH_USER
          value: prow
        - name: GOPATH
          value: /home/prow/go
        - name: CNI_PLUGIN
          value: gce
        - name: KUBE_NODE_COUNT
          value: "100"
        - name: ETCD_VERSION
          value: "3.7.0-rc.0"
        - name: CL2_LOAD_TEST_THROUGHPUT
          value: "50"
        - name: CL2_DELETE_TEST_THROUGHPUT
          value: "50"
        - name: CL2_RATE_LIMIT_POD_CREATION
          value: "false"
        - name: NODE_MODE
          value: "master"
        - name: KUBE_PROXY_MODE
          value: "nftables"
        - name: CONTROL_PLANE_COUNT
          value: "3"
        - name: CONTROL_PLANE_SIZE
          value: "c4-standard-32"
        - name: PROMETHEUS_SCRAPE_KUBE_PROXY
          value: "true"
        - name: CL2_ENABLE_DNS_PROGRAMMING
          value: "true"
        - name: CL2_ENABLE_API_AVAILABILITY_MEASUREMENT
          value: "true"
        - name: CL2_API_AVAILABILITY_PERCENTAGE_THRESHOLD
          value: "99.5"
        - name: CL2_ALLOWED_SLOW_API_CALLS
          value: "1"
        - name: ENABLE_PROMETHEUS_SERVER
          value: "true"
        - name: TEAR_DOWN_PROMETHEUS_SERVER
          value: "false"
        - name: PROMETHEUS_PVC_STORAGE_CLASS
          value: "ssd-csi"
        - name: CLOUD_PROVIDER
          value: "gce"
        - name: BOSKOS_RESOURCE_TYPE
          value: "scalability-project"
        resources:
          requests:
            cpu: 5
            memory: 16Gi
          limits:
            cpu: 5
            memory: 16Gi

  - name: pull-kubernetes-e2e-gce-watch-list-off-benchmark
    cluster: k8s-infra-prow-build
    always_run: false
    optional: true
    max_concurrency: 1
    branches:
    - master
    - main
    decorate: true
    path_alias: k8s.io/kubernetes
    decoration_config:
      timeout: 120m
    labels:
      preset-service-account: "true"
      preset-k8s-ssh: "true"
      preset-dind-enabled: "true"
      preset-e2e-scalability-common: "true"
    extra_refs:
    - org: kubernetes
      repo: perf-tests
      base_ref: master
      path_alias: k8s.io/perf-tests
    annotations:
      testgrid-dashboards: sig-scalability-benchmarks
      testgrid-tab-name: gce-watch-list-off-benchmark
    spec:
      containers:
      - image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260622-537e33cc05-master
        command:
        - runner.sh
        - /workspace/scenarios/kubernetes_e2e.py
        args:
        - --build=quick
        - --check-leaked-resources
        - --env=CL2_ENABLE_WATCH_LIST_FEATURE=false
        - --env=CONTAINER_IMAGE=registry-sandbox.k8s.io/pause:3.1
        - --env=KUBE_GCE_PRIVATE_CLUSTER=false
        - --gcp-node-image=gci
        - --gcp-master-size=n2-standard-32
        - --gcp-node-size=e2-standard-16
        - --gcp-nodes=1
        - --gcp-project-type=scalability-project
        - --provider=gce
        - --test=false
        - --test-cmd=$GOPATH/src/k8s.io/perf-tests/run-e2e.sh
        - --test-cmd-args=cluster-loader2
        - --test-cmd-args=--nodes=1
        - --test-cmd-args=--provider=gce
        - --test-cmd-args=--report-dir=$(ARTIFACTS)
        - --test-cmd-args=--testconfig=testing/watch-list/config.yaml
        - --test-cmd-name=ClusterLoaderV2
        - --timeout=60m
        - --use-logexporter
        - --logexporter-gcs-path=gs://k8s-infra-scalability-tests-logs/$(JOB_NAME)/$(BUILD_ID)
        resources:
          requests:
            cpu: 2
            memory: "8Gi"
          limits:
            cpu: 2
            memory: "8Gi"
        securityContext:
          privileged: true

