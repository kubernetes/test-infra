presubmits:
  kubernetes/kubernetes:
  - always_run: false
    annotations:
      fork-per-release: "true"
      testgrid-alert-stale-results-hours: "24"
      testgrid-create-test-group: "true"
      testgrid-dashboards: presubmits-kubernetes-nonblocking
      testgrid-num-failures-to-alert: "10"
    cluster: k8s-infra-prow-build
    decorate: true
    decoration_config:
      timeout: 680m
    extra_refs:
    - base_ref: master
      org: kubernetes
      path_alias: k8s.io/release
      repo: release
    labels:
      preset-dind-enabled: "true"
      preset-k8s-ssh: "true"
      preset-pull-kubernetes-e2e: "true"
      preset-pull-kubernetes-e2e-gce: "true"
      preset-service-account: "true"
    name: pull-kubernetes-e2e-gce-cos-serial
    optional: true
    path_alias: k8s.io/kubernetes
    spec:
      containers:
      - args:
        - --build=quick
        - --check-leaked-resources
        - --provider=gce
        - --gcp-region=us-central1
        - --gcp-node-image=gci
        - --timeout=660m
        - --ginkgo-parallel=1
        - --test_args=--ginkgo.focus=\[Serial\]|\[Disruptive\] --ginkgo.skip=\[Driver:.gcepd\]|\[Flaky\]|\[Feature:.+\]|\[sig-cloud-provider-gcp\]
          --minStartupPods=8
        command:
        - runner.sh
        - /workspace/scenarios/kubernetes_e2e.py
        image: gcr.io/k8s-staging-test-infra/kubekins-e2e:v20260504-c27e3ff179-master
        resources:
          limits:
            cpu: "4"
            memory: 14Gi
          requests:
            cpu: "4"
            memory: 14Gi
        securityContext:
          privileged: true
