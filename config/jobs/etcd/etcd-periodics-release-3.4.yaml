- name: ci-etcd-integration-1-cpu-release34-amd64
  interval: 24h
  cluster: eks-prow-build-cluster
  decorate: true
  extra_refs:
    - org: etcd-io
      repo: etcd
      base_ref: release-3.4
  annotations:
    testgrid-dashboards: sig-etcd-periodics, sig-etcd-amd64
    testgrid-tab-name: ci-etcd-integration-1-cpu-release34-amd64
  spec:
    containers:
    - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260601-2cbf4bdb47-master
      command:
      - runner.sh
      args:
      - bash
      - -c
      - |
        set -euo pipefail
        make gofail-enable
        export JUNIT_REPORT_DIR=${ARTIFACTS}
        GOOS=linux GOARCH=amd64 CPU=1 make test-integration
      resources:
        requests:
          cpu: "2"
          memory: "3Gi"
        limits:
          cpu: "2"
          memory: "3Gi"


